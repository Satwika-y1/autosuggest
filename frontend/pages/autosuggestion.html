<!DOCTYPE html>
<html>
    <head>
        <style>
            .left-bar{
                position: fixed;
                top: 20px;
                left: 20px;
            }
            .right-bar{
                position: fixed;
                top: 20px;
                right:20px;
            }
            .section{
                text-align: center;
                margin: 100px;
            }
            .heading{
                color: blueviolet;
            }
            .tag-line{
                color: gray;
            }
            .lens{
                position:relative;
                left:40px;


            }
            .search-box{
                padding: 15px 15px 15px 45px; 
                border-radius: 25px;
                width:30%;
            }
            #suggestion-box{
                /* border: 1px solid black; */
                width: 30%;
                margin-left: 35%;
            }
            #suggestion-item{
                border: 1px solid black;
                padding: 10px;
                border-radius: 10px;
                /* cursor: pointer; */
            }
        </style>
    </head>
<body>
<div class="top-bar">
    <span class="left-bar">&#9881;</span>
    <span class="right-bar">&bull; online | &#x1F552; - ms</span>
</div>
<div class="section">
<h1><span class="heading">Being</span>Infinity</h1>

<p class="tag-line">One million phrase. Four algorithms. Prefix Based Auto Suggest.</p>
<span>
    <span class="lens">&#x1F50D;</span>
    <input class="search-box" id="search-box" placeholder="Start typing to search">
    </span>
    <div id="suggestion-box">
        <!-- Suggestion Box -->

    </div>
</div>
<script>
    var searchBox = document.getElementById("search-box");
    var suggestionBox = document.getElementById("suggestion-box");
    searchBox.addEventListener("input", function() {
       //1. get usertype text
       var userInput = searchBox.value;
       if(userInput.trim()===""){

       }else{
        var URL1 =  "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
        var URL2 = "&algorithm=brute&limit=10&weighted=false";
        var url = URL1 + userInput + URL2;
        fetch(url)
        .then(function(response){
            return response.json();
        })
        .then(function(data){
            console.log(data);
            var reslutsArray = data.results;
            var htmlResults = "";
            for(var i=0;i<reslutsArray.length;i++){
                htmlResults += "<div id='suggestion-item'>"+reslutsArray[i].text+"</div>";
            }
             //var suggestionBox = document.getElementById("suggestion-box");
            suggestionBox.innerHTML = htmlResults;

        })
        

       }
       //2. Make API call to get suggestions
       //3. Display results in HTML
    });

</script>

</body>
</html>
